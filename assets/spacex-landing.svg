<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061225"/>
      <stop offset=".48" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="rocketBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".55" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7ad"/>
      <stop offset=".45" stop-color="#ffb86b"/>
      <stop offset="1" stop-color="#ff4ecd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="760" height="520" rx="44" fill="url(#bg)"/>

  <g opacity=".16">
    <path d="M0 92 H760 M0 192 H760 M0 292 H760 M0 392 H760 M126 0 V520 M252 0 V520 M378 0 V520 M504 0 V520 M630 0 V520" stroke="#fff" stroke-width="2"/>
  </g>

  <circle cx="620" cy="102" r="92" fill="#fff" opacity=".11"/>
  <circle cx="135" cy="410" r="120" fill="#fff" opacity=".08"/>

  <g transform="translate(0,-4)" filter="url(#glow)">
    <!-- trajectory -->
    <path d="M150 420 C250 340 315 265 414 175 C470 124 520 92 592 64" fill="none" stroke="#fff" stroke-opacity=".18" stroke-width="6" stroke-linecap="round"/>

    <!-- landing pad -->
    <ellipse cx="382" cy="420" rx="170" ry="28" fill="#ffffff" opacity=".16"/>
    <rect x="250" y="397" width="264" height="26" rx="13" fill="#ffffff" opacity=".35"/>
    <rect x="292" y="382" width="180" height="16" rx="8" fill="#ffffff" opacity=".48"/>

    <!-- clean Falcon-like vertical booster -->
    <g transform="translate(380 234)">
      <path d="M0 -154
               C22 -118 30 -78 30 -20
               L30 112
               C30 128 18 140 0 140
               C-18 140 -30 128 -30 112
               L-30 -20
               C-30 -78 -22 -118 0 -154Z"
            fill="url(#rocketBody)" stroke="#fff" stroke-opacity=".88" stroke-width="5"/>

      <rect x="-18" y="-56" width="36" height="86" rx="12" fill="#0b1028" opacity=".78"/>
      <rect x="-15" y="-46" width="30" height="14" rx="7" fill="#18e8ff" opacity=".9"/>
      <rect x="-15" y="-20" width="30" height="14" rx="7" fill="#18e8ff" opacity=".72"/>
      <rect x="-15" y="6" width="30" height="14" rx="7" fill="#18e8ff" opacity=".55"/>

      <!-- grid fins -->
      <path d="M-30 -18 L-68 -44 L-58 -12 L-30 8Z" fill="#bfdbfe" stroke="#fff" stroke-opacity=".55" stroke-width="3"/>
      <path d="M30 -18 L68 -44 L58 -12 L30 8Z" fill="#bfdbfe" stroke="#fff" stroke-opacity=".55" stroke-width="3"/>

      <!-- landing legs -->
      <path d="M-24 102 L-78 148" stroke="#fff" stroke-opacity=".78" stroke-width="8" stroke-linecap="round"/>
      <path d="M24 102 L78 148" stroke="#fff" stroke-opacity=".78" stroke-width="8" stroke-linecap="round"/>
      <path d="M-84 148 H-42" stroke="#fff" stroke-opacity=".7" stroke-width="8" stroke-linecap="round"/>
      <path d="M42 148 H84" stroke="#fff" stroke-opacity=".7" stroke-width="8" stroke-linecap="round"/>

      <!-- flame -->
      <path d="M-18 132 C-12 166 -4 190 0 216 C4 190 12 166 18 132Z" fill="url(#flame)" opacity=".95"/>
      <path d="M-8 132 C-5 154 -2 170 0 188 C2 170 5 154 8 132Z" fill="#fff7ad" opacity=".85"/>
    </g>
  </g>
</svg>